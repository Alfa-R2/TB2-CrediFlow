<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640">
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif;fill:#212529}
    .brand{font-size:18px;font-weight:700;fill:#fff}
    .title{font-size:16px;font-weight:600;fill:#fff}
    .hu{font-size:12px;font-weight:700;fill:#1c7ed6}
    .cardtitle{font-size:20px;font-weight:700;fill:#212529}
    .section{font-size:14px;font-weight:700;fill:#1c7ed6}
    .label{font-size:13px;fill:#495057}
    .ph{font-size:13px;fill:#adb5bd}
    .btntext{font-size:15px;font-weight:700;fill:#fff}
  </style>
  <rect width="820" height="640" fill="#f1f3f5"/>
  <rect width="820" height="56" fill="#1c7ed6"/>
  <text x="24" y="35" class="brand">CrediFlow</text>
  <text x="410" y="35" text-anchor="middle" class="title">Registro de solicitud de crédito</text>
  <rect x="724" y="16" width="72" height="24" rx="12" fill="#fff"/>
  <text x="760" y="32" text-anchor="middle" class="hu">HU01</text>

  <rect x="24" y="80" width="772" height="540" rx="10" fill="#fff" stroke="#ced4da"/>
  <text x="48" y="118" class="cardtitle">Nueva solicitud</text>
  <rect x="596" y="98" width="176" height="28" rx="14" fill="#ebfbee" stroke="#2f9e44"/>
  <text x="684" y="117" text-anchor="middle" font-size="13" fill="#2f9e44">Estado: Registrada</text>

  <text x="48" y="156" class="section">Datos del cliente</text>
  <text x="48" y="182" class="label">Tipo de documento</text>
  <rect x="48" y="190" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="60" y="213" class="ph">DNI</text>
  <text x="378" y="213" class="ph">▾</text>
  <text x="424" y="182" class="label">N° de documento</text>
  <rect x="424" y="190" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="436" y="213" class="ph">Ingrese número</text>

  <text x="48" y="252" class="label">Nombres</text>
  <rect x="48" y="260" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="424" y="252" class="label">Apellidos</text>
  <rect x="424" y="260" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>

  <text x="48" y="322" class="label">Ingreso mensual (S/)</text>
  <rect x="48" y="330" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="424" y="322" class="label">Deudas actuales (S/)</text>
  <rect x="424" y="330" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>

  <text x="48" y="404" class="section">Datos del crédito</text>
  <text x="48" y="430" class="label">Monto solicitado (S/)</text>
  <rect x="48" y="438" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>
  <text x="424" y="430" class="label">Plazo (meses)</text>
  <rect x="424" y="438" width="348" height="36" rx="6" fill="#f8f9fa" stroke="#ced4da"/>

  <rect x="470" y="540" width="140" height="44" rx="6" fill="#fff" stroke="#ced4da"/>
  <text x="540" y="568" text-anchor="middle" font-size="15" font-weight="700" fill="#495057">Cancelar</text>
  <rect x="624" y="540" width="148" height="44" rx="6" fill="#1c7ed6"/>
  <text x="698" y="568" text-anchor="middle" class="btntext">Registrar</text>
</svg>
